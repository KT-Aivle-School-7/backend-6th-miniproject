version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo "=== Pre-build: 권한 설정 ==="
      - chmod +x ./gradlew

  build:
    commands:
      - echo "=== Build: Spring Boot 빌드 시작 ==="
      - ./gradlew clean build
      - echo "=== Build 완료: 결과물 확인 ==="
      - ls -la build/libs/
      - JAR_FILE=$(ls build/libs/ | grep -v plain | grep '\.jar$' | head -1)
      - echo "대상 JAR: $JAR_FILE"
      - cp build/libs/$JAR_FILE app.jar

  post_build:
    commands:
      - echo "=== Post-build: 배포 패키징 완료 ==="
      - ls -lh app.jar

artifacts:
  files:
    - app.jar
    - appspec.yml
    - scripts/**
  discard-paths: no
