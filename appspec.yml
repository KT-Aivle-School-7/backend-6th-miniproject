version: 0.0
os: linux
files:
  - source: /app.jar
    destination: /home/ec2-user/app
    overwrite: yes
  - source: /scripts
    destination: /home/ec2-user/app/scripts
    overwrite: yes

permissions:
  - object: /home/ec2-user/app/scripts
    pattern: "*.sh"
    owner: ec2-user
    group: ec2-user
    mode: 755
    type:
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: ec2-user

  AfterInstall:
    - location: scripts/start_server.sh
      timeout: 120
      runas: ec2-user

  ValidateService:
    - location: scripts/health_check.sh
      timeout: 60
      runas: ec2-user
